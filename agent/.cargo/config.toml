#
# Cross-compilation linker configuration.
# The CI runner installs gcc-aarch64-linux-gnu and gcc-mingw-w64-x86-64;
# without explicit linker entries Cargo defaults to the host 'cc' (x86_64 GCC)
# which produces x86_64 ELF output even for non-native targets.

[target.aarch64-unknown-linux-gnu]
linker = "aarch64-linux-gnu-gcc"

[target.x86_64-pc-windows-gnu]
linker = "x86_64-w64-mingw32-gcc"
