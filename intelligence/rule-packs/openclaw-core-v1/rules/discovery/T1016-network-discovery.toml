# T1016 — System Network Configuration Discovery
# T1135 — Network Share Discovery
#
# Attackers enumerate network configuration and shares to map the environment
# for lateral movement targets.

[[rules]]
id = "OC-BEH-0086"
name = "Network Configuration Reconnaissance"
enabled = true

[rules.mitre]
tactics    = ["TA0007"]
techniques = ["T1016", "T1049"]

[rules.match]
type        = "behavioral"
event_types = ["process.create"]

[[rules.match.conditions]]
field    = "payload.process_name"
operator = "in"
values   = ["ipconfig.exe", "arp.exe", "route.exe", "netstat.exe", "nslookup.exe"]

[[rules.match.conditions]]
field    = "payload.parent_process_name"
operator = "in"
values   = [
  "cmd.exe",
  "powershell.exe",
  "pwsh.exe",
  "wscript.exe",
  "cscript.exe",
  "mshta.exe",
]

[rules.response]
severity     = "LOW"
auto_contain = []
notify       = false


[[rules]]
id = "OC-BEH-0087"
name = "Network Share and Domain Enumeration"
enabled = true

[rules.mitre]
tactics    = ["TA0007"]
techniques = ["T1135", "T1069.002", "T1087.002"]

[rules.match]
type        = "behavioral"
event_types = ["process.create"]

[[rules.match.conditions]]
field    = "payload.process_name"
operator = "in"
values   = ["net.exe", "net1.exe"]

[[rules.match.conditions]]
field    = "payload.command_line"
operator = "contains"
values   = [
  "view",
  "share",
  "group",
  "localgroup",
  "user /domain",
  "accounts /domain",
]

[rules.response]
severity     = "LOW"
auto_contain = []
notify       = false
