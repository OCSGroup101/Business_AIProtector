# T1562 — Impair Defenses: Disabling or modifying security tools

[[rules]]
id = "OC-BEH-0050"
name = "Windows Defender Disabled or Exclusion Added"
enabled = true

[rules.mitre]
tactics    = ["TA0005"]
techniques = ["T1562.001"]

[rules.match]
type        = "behavioral"
event_types = ["process.create"]

[[rules.match.conditions]]
field    = "payload.process_name"
operator = "in"
values   = ["powershell.exe", "pwsh.exe"]

[[rules.match.conditions]]
field    = "payload.command_line"
operator = "contains"
values   = [
  "Set-MpPreference",
  "Add-MpPreference",
  "DisableRealtimeMonitoring",
  "DisableBehaviorMonitoring",
  "ExclusionPath",
  "ExclusionExtension",
]

[rules.response]
severity     = "CRITICAL"
auto_contain = []
notify       = true


[[rules]]
id = "OC-BEH-0051"
name = "Security Event Log Cleared"
enabled = true

[rules.mitre]
tactics    = ["TA0005"]
techniques = ["T1070.001"]

[rules.match]
type        = "behavioral"
event_types = ["process.create"]

[[rules.match.conditions]]
field    = "payload.process_name"
operator = "eq"
values   = ["wevtutil.exe"]

[[rules.match.conditions]]
field    = "payload.command_line"
operator = "contains"
values   = ["cl ", "clear-log", "sl ", "Security", "System", "Application"]

[rules.response]
severity     = "CRITICAL"
auto_contain = []
notify       = true


[[rules]]
id = "OC-BEH-0052"
name = "Security Event Log Cleared via PowerShell"
enabled = true

[rules.mitre]
tactics    = ["TA0005"]
techniques = ["T1070.001"]

[rules.match]
type        = "behavioral"
event_types = ["process.create"]

[[rules.match.conditions]]
field    = "payload.process_name"
operator = "in"
values   = ["powershell.exe", "pwsh.exe"]

[[rules.match.conditions]]
field    = "payload.command_line"
operator = "contains"
values   = ["Clear-EventLog", "Remove-EventLog", "Limit-EventLog"]

[rules.response]
severity     = "CRITICAL"
auto_contain = []
notify       = true
