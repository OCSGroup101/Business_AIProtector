# T1036 — Masquerading

[[rules]]
id = "OC-BEH-0020"
name = "System Binary Masquerading"
enabled = true
description = """
Detects executables using the names of legitimate Windows system binaries
but running from non-standard paths (a common masquerading technique).
"""

[rules.mitre]
tactics = ["TA0005"]
techniques = ["T1036.005"]

[rules.match]
type = "behavioral"
event_types = ["process.create"]

[[rules.match.conditions]]
field = "payload.process_name"
operator = "in"
values = ["svchost.exe", "lsass.exe", "csrss.exe", "winlogon.exe", "services.exe"]

[[rules.match.conditions]]
field = "payload.image_path"
operator = "contains"
values = ["\\Users\\", "\\Temp\\", "\\AppData\\", "\\Downloads\\", "\\ProgramData\\"]

[rules.response]
severity = "HIGH"
auto_contain = ["terminate_process"]
notify = true
tts = true


[[rules]]
id = "OC-BEH-0021"
name = "Windows Event Log Cleared"
enabled = true
description = "Detects clearing of Windows event logs — often used to cover intrusion tracks."

[rules.mitre]
tactics = ["TA0005"]
techniques = ["T1070.001"]

[rules.match]
type = "behavioral"
event_types = ["auth.logon"]

[[rules.match.conditions]]
field = "payload.event_id"
operator = "in"
values = ["1102", "104"]

[rules.response]
severity = "HIGH"
auto_contain = []
notify = true
tts = true


[[rules]]
id = "OC-BEH-0022"
name = "Security Tool Process Terminated"
enabled = true
description = """
Detects termination of common security tool processes — AV, EDR, firewall agents.
Often an early indicator of ransomware or targeted attack preparation.
"""

[rules.mitre]
tactics = ["TA0005"]
techniques = ["T1562.001"]

[rules.match]
type = "behavioral"
event_types = ["process.terminate"]

[[rules.match.conditions]]
field = "payload.process_name"
operator = "in"
values = [
    "msseces.exe", "msmpeng.exe", "avgnt.exe", "avguard.exe",
    "mbam.exe", "malwarebytes.exe", "bdagent.exe", "vsserv.exe",
    "ekrn.exe", "egui.exe", "ccsvchst.exe", "nortonsecurity.exe",
]

[rules.response]
severity = "CRITICAL"
auto_contain = []
notify = true
tts = true
