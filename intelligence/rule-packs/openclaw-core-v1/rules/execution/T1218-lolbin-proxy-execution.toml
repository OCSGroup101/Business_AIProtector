# T1218 — Signed Binary Proxy Execution (LOLBins)
# Detects abuse of Windows-signed binaries to execute unsigned/attacker code.

[[rules]]
id = "OC-BEH-0010"
name = "LOLBin Proxy Execution"
enabled = true

[rules.mitre]
tactics    = ["TA0005", "TA0002"]
techniques = ["T1218", "T1218.005", "T1218.010", "T1218.011"]

[rules.match]
type        = "behavioral"
event_types = ["process.create"]

[[rules.match.conditions]]
field    = "payload.process_name"
operator = "in"
values   = [
  "mshta.exe",
  "regsvr32.exe",
  "regasm.exe",
  "regsvcs.exe",
  "installutil.exe",
  "ieexec.exe",
  "msconfig.exe",
  "cmstp.exe",
  "xwizard.exe",
  "odbcconf.exe",
]

[rules.response]
severity     = "HIGH"
auto_contain = []
notify       = true


[[rules]]
id = "OC-BEH-0011"
name = "Certutil Decode or Download"
enabled = true

[rules.mitre]
tactics    = ["TA0005", "TA0011"]
techniques = ["T1140", "T1105"]

[rules.match]
type        = "behavioral"
event_types = ["process.create"]

[[rules.match.conditions]]
field    = "payload.process_name"
operator = "eq"
values   = ["certutil.exe"]

[[rules.match.conditions]]
field    = "payload.command_line"
operator = "contains"
values   = ["-decode", "-urlcache", "-split", "http"]

[rules.response]
severity     = "HIGH"
auto_contain = []
notify       = true


[[rules]]
id = "OC-BEH-0012"
name = "PowerShell Encoded Command Execution"
enabled = true

[rules.mitre]
tactics    = ["TA0002"]
techniques = ["T1059.001"]

[rules.match]
type        = "behavioral"
event_types = ["process.create"]

[[rules.match.conditions]]
field    = "payload.process_name"
operator = "in"
values   = ["powershell.exe", "pwsh.exe"]

[[rules.match.conditions]]
field    = "payload.command_line"
operator = "contains"
values   = ["-enc", "-encodedcommand", "-ec ", "bypass", "hidden", "iex", "invoke-expression"]

[rules.response]
severity     = "HIGH"
auto_contain = []
notify       = true
