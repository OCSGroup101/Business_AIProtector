# T1003 — OS Credential Dumping

[[rules]]
id = "OC-BEH-0030"
name = "LSASS Memory Access"
enabled = true
description = """
Detects suspicious access to lsass.exe memory — used by credential dumping
tools (Mimikatz, Procdump, Task Manager dump). High confidence indicator.
"""

[rules.mitre]
tactics = ["TA0006"]
techniques = ["T1003.001"]

[rules.match]
type = "behavioral"
event_types = ["process.create"]

[[rules.match.conditions]]
field = "payload.target_process"
operator = "eq"
values = ["lsass.exe"]

[[rules.match.conditions]]
field = "payload.access_mask"
operator = "in"
values = ["0x1FFFFF", "0x1010", "0x1F3FFF", "0x143A"]

[rules.response]
severity = "CRITICAL"
auto_contain = ["terminate_process"]
notify = true
tts = true


[[rules]]
id = "OC-HEU-0001"
name = "Authentication Brute Force"
enabled = true
description = """
Detects repeated authentication failures from the same user account
within a sliding window — indicative of brute force or credential stuffing.
"""

[rules.mitre]
tactics = ["TA0006"]
techniques = ["T1110.001"]

[rules.match]
type = "heuristic"
window_seconds = 60
event_types = ["auth.logon_failure"]

lua_script = """
function evaluate(event, context)
  -- Count failures per user in the window
  local counts = {}
  for _, e in ipairs(context.recent_events) do
    if e.event_type == "auth.logon_failure" then
      local user = e.principal and e.principal.user or "unknown"
      counts[user] = (counts[user] or 0) + 1
    end
  end
  local current_user = event.principal and event.principal.user or "unknown"
  local fail_count = counts[current_user] or 0
  if fail_count >= 5 then
    return true, { failure_count = fail_count, user = current_user }
  end
  return false, {}
end
return evaluate
"""

[rules.response]
severity = "HIGH"
notify = true
