version: "3.9"

# OpenClaw development stack
# Usage: make dev-up  (or: docker compose up -d)
#
# Services:
#   postgres   - PostgreSQL 16 (multi-tenant schema storage)
#   redis      - Redis 7 (cache, rate limiting, session tokens)
#   kafka      - Kafka 3.8 (telemetry + intel ingestion)
#   zookeeper  - Required by Kafka
#   keycloak   - Keycloak 26 (identity provider, two realms)
#   minio      - MinIO (quarantine artifacts, intel bundles)
#   kong       - Kong 3.8 (API gateway, TLS termination)
#   kong-db    - PostgreSQL for Kong configuration
#   platform   - FastAPI platform API (hot-reload in dev)
#   console    - Next.js dev server

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

networks:
  openclaw-internal:
    driver: bridge
  openclaw-external:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  kafka-data:
  zookeeper-data:
  keycloak-data:
  minio-data:
  kong-db-data:

services:
  # ─── PostgreSQL 16 ────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: openclaw-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: openclaw
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-openclaw_dev_password}
      POSTGRES_DB: openclaw
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./platform/deployment/postgres/init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    ports:
      - "5432:5432"
    networks:
      - openclaw-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openclaw -d openclaw"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  # ─── Redis 7 ──────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: openclaw-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-openclaw_dev_redis}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - openclaw-internal
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-openclaw_dev_redis}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  # ─── Zookeeper (Kafka dependency) ─────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: openclaw-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_LOG4J_ROOT_LOGLEVEL: WARN
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
    networks:
      - openclaw-internal
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  # ─── Apache Kafka 3.8 ─────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: openclaw-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG4J_ROOT_LOGLEVEL: WARN
    volumes:
      - kafka-data:/var/lib/kafka/data
    ports:
      - "9092:9092"
    networks:
      - openclaw-internal
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:29092"]
      interval: 15s
      timeout: 10s
      retries: 5
    logging: *default-logging

  # ─── Keycloak 26 ──────────────────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: openclaw-keycloak
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: openclaw
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-openclaw_dev_password}
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-keycloak_admin_dev}
      KC_HTTP_PORT: 8080
      KC_HOSTNAME_STRICT: "false"
      KC_LOG_LEVEL: WARN
    volumes:
      - ./platform/deployment/keycloak/realms:/opt/keycloak/data/import:ro
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - openclaw-internal
      - openclaw-external
    healthcheck:
      # Keycloak 26 moved the health endpoint to the management interface
      # (port 9000) in start-dev mode; port 8080 returns 404 for /health/*.
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/health/ready || exit 1"]
      interval: 20s
      timeout: 15s
      retries: 15
      start_period: 90s
    logging: *default-logging

  # ─── MinIO ────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: openclaw-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-openclaw_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-openclaw_minio_dev}
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - openclaw-internal
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  # ─── Kong DB (PostgreSQL for Kong) ────────────────────────────────────────
  kong-db:
    image: postgres:16-alpine
    container_name: openclaw-kong-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: kong
      POSTGRES_PASSWORD: ${KONG_DB_PASSWORD:-kong_dev_password}
      POSTGRES_DB: kong
    volumes:
      - kong-db-data:/var/lib/postgresql/data
    networks:
      - openclaw-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kong -d kong"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  # ─── Kong migration (one-shot) ────────────────────────────────────────────
  kong-migration:
    image: kong:3.8
    container_name: openclaw-kong-migration
    restart: on-failure
    command: kong migrations bootstrap
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-db
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: ${KONG_DB_PASSWORD:-kong_dev_password}
      KONG_PG_DATABASE: kong
    depends_on:
      kong-db:
        condition: service_healthy
    networks:
      - openclaw-internal
    logging: *default-logging

  # ─── Kong 3.8 API Gateway ─────────────────────────────────────────────────
  kong:
    image: kong:3.8
    container_name: openclaw-kong
    restart: unless-stopped
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-db
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: ${KONG_DB_PASSWORD:-kong_dev_password}
      KONG_PG_DATABASE: kong
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_PROXY_LISTEN: 0.0.0.0:8443 ssl, 0.0.0.0:8000
      KONG_SSL_CERT: /etc/kong/certs/tls.crt
      KONG_SSL_CERT_KEY: /etc/kong/certs/tls.key
    volumes:
      - ./platform/deployment/kong/certs:/etc/kong/certs:ro
      - ./platform/deployment/kong/declarative:/etc/kong/declarative:ro
    ports:
      - "8000:8000"
      - "8443:8443"
      - "8001:8001"
    depends_on:
      kong-migration:
        condition: service_completed_successfully
    networks:
      - openclaw-internal
      - openclaw-external
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 15s
      timeout: 10s
      retries: 5
    logging: *default-logging

  # ─── OpenClaw Platform API ─────────────────────────────────────────────────
  platform-api:
    build:
      context: ./platform/api
      dockerfile: Dockerfile.dev
    container_name: openclaw-platform-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://openclaw:${POSTGRES_PASSWORD:-openclaw_dev_password}@postgres:5432/openclaw
      REDIS_URL: redis://:${REDIS_PASSWORD:-openclaw_dev_redis}@redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM_PLATFORM: openclaw-platform
      KEYCLOAK_REALM_AGENTS: openclaw-agents
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-openclaw_minio}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-openclaw_minio_dev}
      LOG_LEVEL: DEBUG
      ENVIRONMENT: development
    volumes:
      - ./platform/api:/app:cached
    ports:
      - "8888:8888"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      keycloak:
        # Dev mode (OPENCLAW_DEV_MODE=true) bypasses Keycloak JWT validation;
        # use service_started so CI doesn't block waiting for KC to be healthy.
        condition: service_started
    networks:
      - openclaw-internal
    logging: *default-logging

  # ─── OpenClaw Management Console ──────────────────────────────────────────
  console:
    build:
      context: ./platform/console
      dockerfile: Dockerfile.dev
    container_name: openclaw-console
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_KEYCLOAK_URL: http://localhost:8080
      NEXT_PUBLIC_KEYCLOAK_REALM: openclaw-platform
      NEXT_PUBLIC_KEYCLOAK_CLIENT_ID: openclaw-console
    volumes:
      - ./platform/console:/app:cached
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    depends_on:
      - platform-api
    networks:
      - openclaw-internal
      - openclaw-external
    logging: *default-logging
